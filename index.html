<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Book a Room</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label for="instructorName">Instructor Name</label>
            <input type="text" id="instructorName" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="room">Room</label>
            <select id="room" required>
                <option value="">Select a room...</option>
                <option value="Computer Laboratory">Lab 1</option>
                <option value="IT Lecture Room">IT Lecture Room</option>
                <option value="Building B201">Building B201</option>
                <option value="Building B102">Building B102</option>
                <option value="Building B101">Building B101</option>
            </select>
        </div>
        <div class="form-group">
            <label for="startTime">Start Time</label>
            <input type="datetime-local" id="startTime" required> 
        </div>
        <div class="form-group">
            <label for="endTime">End Time</label>
            <input type="datetime-local" id="endTime" required>
        </div>
        <button type="submit" id="submitBtn">Submit Request</button>
        <div id="statusMessage"></div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
